# Optional full-stack deployment for Coolify's "Docker Compose" build pack.
#
# If you instead use the "Dockerfile" build pack, Coolify ignores this file —
# just attach managed Database/Redis resources in the UI and set the env vars.
#
# Coolify injects values for ${VARIABLE} from the application's Environment
# Variables. Set at minimum: APP_KEY, APP_URL, DB_PASSWORD.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      APP_NAME: "${APP_NAME:-MommyLovesMe}"
      APP_ENV: production
      APP_KEY: "${APP_KEY}"
      APP_DEBUG: "false"
      APP_URL: "${APP_URL}"

      LOG_CHANNEL: stderr
      LOG_LEVEL: "${LOG_LEVEL:-warning}"

      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: "${DB_DATABASE:-mommylovesme}"
      DB_USERNAME: "${DB_USERNAME:-mommylovesme}"
      DB_PASSWORD: "${DB_PASSWORD}"

      SESSION_DRIVER: database
      QUEUE_CONNECTION: database
      CACHE_STORE: redis

      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_CLIENT: phpredis
    ports:
      - "80"
    volumes:
      # Persist user uploads (public disk) across redeploys
      - app-storage:/var/www/html/storage/app/public
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/up"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  mysql:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: "${DB_DATABASE:-mommylovesme}"
      MARIADB_USER: "${DB_USERNAME:-mommylovesme}"
      MARIADB_PASSWORD: "${DB_PASSWORD}"
      MARIADB_ROOT_PASSWORD: "${DB_ROOT_PASSWORD:-${DB_PASSWORD}}"
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data

volumes:
  app-storage:
  db-data:
  redis-data:
